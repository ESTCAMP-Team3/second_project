version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: finance-backend
    ports:
      - "5001:5000"  # 외부포트:내부포트
    environment:
      - FLASK_ENV=development
    volumes:
      - ./backend:/app
    restart: always

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: finance-web
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - backend
